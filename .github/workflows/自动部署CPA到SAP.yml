name: 自动部署CLI Proxy API到SAP

on:
  workflow_dispatch:
    inputs:
      region:
        description: '选择部署区域'
        required: true
        default: 'US(free)'
        type: choice
        options:
          # 免费区域
          - SG(free)
          - US(free)

          # SAP 区域
          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-US(Sterling)
          - SAP-US-West(Colorado)
          - SAP-JP(Tokyo)

          # AWS 区域
          - AWS-AU(Sydney)
          - AWS-BR(São Paulo)
          - AWS-KR(Seoul)
          - AWS-CA(Montreal)
          - AWS-US(VA)
          - AWS-US(OR)
          - AWS-EU(Frankfurt)
          - AWS-JP(Tokyo)
          - AWS-SG(Singapore)

          # GCP 区域
          - GCP-AU(Sydney)
          - GCP-BR(São Paulo)
          - GCP-US(IA)
          - GCP-EU(Frankfurt)
          - GCP-JP(Osaka)
          - GCP-JP(Tokyo)
          - GCP-IL(Tel Aviv)
          - GCP-IN(Mumbai)
          - GCP-KSA(Dammam)

          # Azure 区域
          - Azure-AU(Sydney)
          - Azure-BR(São Paulo)
          - Azure-CA(Montreal)
          - Azure-US(VA)
          - Azure-US(WA)
          - Azure-EU(Netherlands)
          - Azure-JP(Tokyo)
          - Azure-SG(Singapore)

          # SAP Neo 区域
          - Neo-UAE(Dubai)
          - Neo-KSA(Riyadh)

      app_name:
        description: '应用名称（可选，留空则自动生成）'
        required: false
        default: ''

env:
  DOCKER_IMAGE: eceasy/cli-proxy-api:latest
  MEMORY: ${{ secrets.MEMORY || '1024M' }}
  DISK: ${{ secrets.DISK || '2048M' }}

permissions:
  contents: read

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          set -e

          sudo mkdir -p /usr/share/keyrings
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo gpg --dearmor -o /usr/share/keyrings/cloudfoundry-cli.gpg

          echo "deb [signed-by=/usr/share/keyrings/cloudfoundry-cli.gpg] https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list

          sudo apt-get update
          sudo apt-get install -y cf8-cli

          cf version

      - name: Determine CF API endpoint and app name
        env:
          INPUT_REGION: ${{ github.event.inputs.region }}
          INPUT_APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          set -e

          RANDOM_STR=$(openssl rand -hex 3)
          AUTO_GENERATED_APP=true

          case "$INPUT_REGION" in
            # 免费区域
            "SG(free)")
              CF_API="https://api.cf.ap21.hana.ondemand.com"
              APP_NAME="cli-proxy-freesg$RANDOM_STR"
              ;;

            "US(free)")
              CF_API="https://api.cf.us10-001.hana.ondemand.com"
              APP_NAME="cli-proxy-freeus$RANDOM_STR"
              ;;

            # SAP 区域
            "SAP-UAE(Dubai)")
              CF_API="https://api.cf.ae01.hana.ondemand.com"
              APP_NAME="cli-proxy-sapae$RANDOM_STR"
              ;;

            "SAP-AU(Sydney)")
              CF_API="https://api.cf.ap01.hana.ondemand.com"
              APP_NAME="cli-proxy-sapau$RANDOM_STR"
              ;;

            "SAP-US(Sterling)")
              CF_API="https://api.cf.us01.hana.ondemand.com"
              APP_NAME="cli-proxy-sapus1$RANDOM_STR"
              ;;

            "SAP-US-West(Colorado)")
              CF_API="https://api.cf.us02.hana.ondemand.com"
              APP_NAME="cli-proxy-sapusw$RANDOM_STR"
              ;;

            "SAP-JP(Tokyo)")
              CF_API="https://api.cf.jp01.hana.ondemand.com"
              APP_NAME="cli-proxy-sapjp$RANDOM_STR"
              ;;

            # AWS 区域
            "AWS-AU(Sydney)")
              CF_API="https://api.cf.ap10.hana.ondemand.com"
              APP_NAME="cli-proxy-awsau$RANDOM_STR"
              ;;

            "AWS-BR(São Paulo)")
              CF_API="https://api.cf.br10.hana.ondemand.com"
              APP_NAME="cli-proxy-awsbr$RANDOM_STR"
              ;;

            "AWS-KR(Seoul)")
              CF_API="https://api.cf.ap12.hana.ondemand.com"
              APP_NAME="cli-proxy-awskr$RANDOM_STR"
              ;;

            "AWS-CA(Montreal)")
              CF_API="https://api.cf.ca10.hana.ondemand.com"
              APP_NAME="cli-proxy-awsca$RANDOM_STR"
              ;;

            "AWS-US(VA)")
              CF_API="https://api.cf.us10-001.hana.ondemand.com"
              APP_NAME="cli-proxy-awsusva$RANDOM_STR"
              ;;

            "AWS-US(OR)")
              CF_API="https://api.cf.us11.hana.ondemand.com"
              APP_NAME="cli-proxy-awsusor$RANDOM_STR"
              ;;

            "AWS-EU(Frankfurt)")
              CF_API="https://api.cf.eu10-005.hana.ondemand.com"
              APP_NAME="cli-proxy-awseu$RANDOM_STR"
              ;;

            "AWS-JP(Tokyo)")
              CF_API="https://api.cf.jp10.hana.ondemand.com"
              APP_NAME="cli-proxy-awsjp$RANDOM_STR"
              ;;

            "AWS-SG(Singapore)")
              CF_API="https://api.cf.ap11.hana.ondemand.com"
              APP_NAME="cli-proxy-awssg$RANDOM_STR"
              ;;

            # GCP 区域
            "GCP-AU(Sydney)")
              CF_API="https://api.cf.ap30.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpau$RANDOM_STR"
              ;;

            "GCP-BR(São Paulo)")
              CF_API="https://api.cf.br30.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpbr$RANDOM_STR"
              ;;

            "GCP-US(IA)")
              CF_API="https://api.cf.us30.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpus$RANDOM_STR"
              ;;

            "GCP-EU(Frankfurt)")
              CF_API="https://api.cf.eu30.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpeu$RANDOM_STR"
              ;;

            "GCP-JP(Osaka)")
              CF_API="https://api.cf.jp30.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpjpo$RANDOM_STR"
              ;;

            "GCP-JP(Tokyo)")
              CF_API="https://api.cf.jp31.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpjpt$RANDOM_STR"
              ;;

            "GCP-IL(Tel Aviv)")
              CF_API="https://api.cf.il30.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpil$RANDOM_STR"
              ;;

            "GCP-IN(Mumbai)")
              CF_API="https://api.cf.in30.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpin$RANDOM_STR"
              ;;

            "GCP-KSA(Dammam)")
              CF_API="https://api.cf.sa31.hana.ondemand.com"
              APP_NAME="cli-proxy-gcpsa$RANDOM_STR"
              ;;

            # Azure 区域
            "Azure-AU(Sydney)")
              CF_API="https://api.cf.ap20.hana.ondemand.com"
              APP_NAME="cli-proxy-azau$RANDOM_STR"
              ;;

            "Azure-BR(São Paulo)")
              CF_API="https://api.cf.br20.hana.ondemand.com"
              APP_NAME="cli-proxy-azbr$RANDOM_STR"
              ;;

            "Azure-CA(Montreal)")
              CF_API="https://api.cf.ca20.hana.ondemand.com"
              APP_NAME="cli-proxy-azca$RANDOM_STR"
              ;;

            "Azure-US(VA)")
              CF_API="https://api.cf.us21.hana.ondemand.com"
              APP_NAME="cli-proxy-azva$RANDOM_STR"
              ;;

            "Azure-US(WA)")
              CF_API="https://api.cf.us20.hana.ondemand.com"
              APP_NAME="cli-proxy-azwa$RANDOM_STR"
              ;;

            "Azure-EU(Netherlands)")
              CF_API="https://api.cf.eu20-001.hana.ondemand.com"
              APP_NAME="cli-proxy-azeu$RANDOM_STR"
              ;;

            "Azure-JP(Tokyo)")
              CF_API="https://api.cf.jp20.hana.ondemand.com"
              APP_NAME="cli-proxy-azjp$RANDOM_STR"
              ;;

            "Azure-SG(Singapore)")
              CF_API="https://api.cf.ap21.hana.ondemand.com"
              APP_NAME="cli-proxy-azsg$RANDOM_STR"
              ;;

            # SAP Neo 区域
            "Neo-UAE(Dubai)")
              CF_API="https://api.cf.neo-ae1.hana.ondemand.com"
              APP_NAME="cli-proxy-neouae$RANDOM_STR"
              ;;

            "Neo-KSA(Riyadh)")
              CF_API="https://api.cf.neo-sa1.hana.ondemand.com"
              APP_NAME="cli-proxy-neoksa$RANDOM_STR"
              ;;

            *)
              echo "❌ 未知区域: $INPUT_REGION"
              exit 1
              ;;
          esac

          # 如果用户提供了应用名称，则使用用户提供的应用名称
          if [ -n "$INPUT_APP_NAME" ]; then
            if [[ ! "$INPUT_APP_NAME" =~ ^[a-z0-9]([-a-z0-9]{0,61}[a-z0-9])?$ ]]; then
              echo "❌ 应用名称不合法"
              echo "应用名称只能包含小写字母、数字和中横线，并且必须以字母或数字开头和结尾。"
              exit 1
            fi

            APP_NAME="$INPUT_APP_NAME"
            AUTO_GENERATED_APP=false
          fi

          {
            echo "CF_API=$CF_API"
            echo "APP_NAME=$APP_NAME"
            echo "AUTO_GENERATED_APP=$AUTO_GENERATED_APP"
          } >> "$GITHUB_ENV"

          echo "使用API端点: $CF_API"
          echo "应用名称: $APP_NAME"
          echo "部署镜像: $DOCKER_IMAGE"
          echo "内存: $MEMORY"
          echo "磁盘: $DISK"

      - name: Login to Cloud Foundry
        env:
          CF_USERNAME: ${{ secrets.EMAIL }}
          CF_PASSWORD: ${{ secrets.PASSWORD }}
          CF_ORG_INPUT: ${{ secrets.CF_ORG }}
          CF_SPACE_INPUT: ${{ secrets.CF_SPACE }}
        run: |
          set -e

          if [ -z "$CF_USERNAME" ]; then
            echo "❌ 缺少 GitHub Secret: EMAIL"
            exit 1
          fi

          if [ -z "$CF_PASSWORD" ]; then
            echo "❌ 缺少 GitHub Secret: PASSWORD"
            exit 1
          fi

          cf api "$CF_API"
          cf auth "$CF_USERNAME" "$CF_PASSWORD"

          # 如果设置了 CF_ORG secret，则使用指定组织；否则自动取第一个组织
          if [ -n "$CF_ORG_INPUT" ]; then
            ORG="$CF_ORG_INPUT"
          else
            ORG=$(cf orgs | sed -n '4p')
          fi

          if [ -z "$ORG" ]; then
            echo "❌ 未找到可用的 Cloud Foundry 组织 ORG"
            exit 1
          fi

          echo "Selected org: $ORG"
          cf target -o "$ORG"

          # 如果设置了 CF_SPACE secret，则使用指定空间；否则自动取第一个空间
          if [ -n "$CF_SPACE_INPUT" ]; then
            SPACE="$CF_SPACE_INPUT"
          else
            SPACE=$(cf spaces | sed -n '4p')
          fi

          if [ -z "$SPACE" ]; then
            echo "❌ 未找到可用的 Cloud Foundry 空间 SPACE"
            exit 1
          fi

          echo "Selected space: $SPACE"
          cf target -o "$ORG" -s "$SPACE"

          {
            echo "ORG=$ORG"
            echo "SPACE=$SPACE"
          } >> "$GITHUB_ENV"

      - name: Deploy application
        run: |
          set -e

          echo "开始创建应用，但暂不启动..."
          echo "App Name: $APP_NAME"
          echo "Docker Image: $DOCKER_IMAGE"

          if cf push "$APP_NAME" \
            --docker-image "$DOCKER_IMAGE" \
            -m "$MEMORY" \
            -k "$DISK" \
            --health-check-type port \
            --no-start; then

            echo "应用创建成功，等待设置环境变量..."
          else
            if [ "$AUTO_GENERATED_APP" = "true" ]; then
              cf delete "$APP_NAME" -f || true
            fi

            echo "❌ 部署失败，已清理失败部署残留"
            exit 1
          fi

      - name: Set ObjectStore variables and start app
        env:
          OBJECTSTORE_ENDPOINT: ${{ secrets.OBJECTSTORE_ENDPOINT }}
          OBJECTSTORE_ACCESS_KEY: ${{ secrets.OBJECTSTORE_ACCESS_KEY }}
          OBJECTSTORE_SECRET_KEY: ${{ secrets.OBJECTSTORE_SECRET_KEY }}
          OBJECTSTORE_BUCKET: ${{ secrets.OBJECTSTORE_BUCKET }}
          MANAGEMENT_PASSWORD: ${{ secrets.MANAGEMENT_PASSWORD }}
        run: |
          set -e

          # 检查必需变量
          for var in OBJECTSTORE_ENDPOINT OBJECTSTORE_ACCESS_KEY OBJECTSTORE_SECRET_KEY OBJECTSTORE_BUCKET MANAGEMENT_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "❌ 缺少 GitHub Secret: $var"
              exit 1
            fi
          done

          echo "开始设置对象存储环境变量..."

          cf set-env "$APP_NAME" OBJECTSTORE_ENDPOINT "$OBJECTSTORE_ENDPOINT"
          cf set-env "$APP_NAME" OBJECTSTORE_ACCESS_KEY "$OBJECTSTORE_ACCESS_KEY"
          cf set-env "$APP_NAME" OBJECTSTORE_SECRET_KEY "$OBJECTSTORE_SECRET_KEY"
          cf set-env "$APP_NAME" OBJECTSTORE_BUCKET "$OBJECTSTORE_BUCKET"
          cf set-env "$APP_NAME" MANAGEMENT_PASSWORD "$MANAGEMENT_PASSWORD"

          echo "环境变量设置完成，开始启动应用..."

          if cf start "$APP_NAME"; then
            echo "应用启动命令执行成功"
          else
            echo "❌ 应用启动失败，查看最近日志："
            cf logs "$APP_NAME" --recent || true

            if [ "$AUTO_GENERATED_APP" = "true" ]; then
              cf delete "$APP_NAME" -f || true
            fi

            exit 1
          fi

      - name: Verify deployment
        run: |
          set -e

          STATUS=$(cf app "$APP_NAME" | awk '/requested state:/ {print $3; exit}')

          if [ "$STATUS" = "started" ]; then
            echo "✅ cli-proxy-api 启动成功"
          else
            echo "❌ 应用启动失败，当前状态: $STATUS"
            echo "查看应用日志:"
            cf logs "$APP_NAME" --recent || true
            exit 1
          fi

      - name: 详细部署信息
        run: |
          set -e

          echo "🚀 部署完成！详细信息如下："
          echo "区域(Region): ${{ github.event.inputs.region }}"
          echo "组织(ORG): $ORG"
          echo "空间(SPACE): $SPACE"
          echo "应用名称(App Name): $APP_NAME"
          echo "镜像(Image): $DOCKER_IMAGE"

          ROUTE=$(cf app "$APP_NAME" | awk '/routes:/ {print $2; exit}')

          if [ -n "$ROUTE" ]; then
            echo "WebUI URL: https://$ROUTE"
            echo "WebUI 管理密码使用 GitHub Secret: MANAGEMENT_PASSWORD"
          else
            echo "⚠️ 未找到应用路由，请检查部署状态。"
          fi
