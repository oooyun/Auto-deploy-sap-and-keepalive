name: 自动部署OpenList到SAP

on:
  workflow_dispatch:  # 只允许手动触发
    inputs:
      region:
        description: '选择部署区域'
        required: true
        default: 'US(free)'
        type: choice
        options:
          #  免费区域
          - SG(free)  # azure新加披
          - US(free)  # aws美国
          # SAP 区域
          - SAP-UAE(Dubai)
          - SAP-AU(Sydney)
          - SAP-US(Sterling)
          - SAP-US-West(Colorado)
          - SAP-JP(Tokyo)
          # AWS 区域
          - AWS-AU(Sydney)
          - AWS-BR(São Paulo)
          - AWS-KR(Seoul)
          - AWS-CA(Montreal)
          - AWS-US(VA)
          - AWS-US(OR)
          - AWS-EU(Frankfurt)
          - AWS-JP(Tokyo)
          - AWS-SG(Singapore)
          # GCP 区域
          - GCP-AU(Sydney)
          - GCP-BR(São Paulo)
          - GCP-US(IA)
          - GCP-EU(Frankfurt)
          - GCP-JP(Osaka)
          - GCP-JP(Tokyo)
          - GCP-IL(Tel Aviv)
          - GCP-IN(Mumbai)
          - GCP-KSA(Dammam)
          # Azure 区域
          - Azure-AU(Sydney)
          - Azure-BR(São Paulo)
          - Azure-CA(Montreal)
          - Azure-US(VA)
          - Azure-US(WA)
          - Azure-EU(Netherlands)
          - Azure-JP(Tokyo)
          - Azure-SG(Singapore)
          # SAP Neo 区域
          - Neo-UAE(Dubai)
          - Neo-KSA(Riyadh)
      app_name:
        description: '应用名称（可选，留空则自动生成）'
        required: false
        default: ''
env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE || 'liu0223/oplist-fp' }}
  MEMORY: ${{ secrets.MEMORY || '1024M' }}
  DISK: ${{ secrets.DISK || '6144M' }}
  OPENLIST_ADMIN_PASSWORD: ${{ secrets.OPENLIST_ADMIN_PASSWORD }}
  DB_PORT: ${{ secrets.DB_PORT }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_PASS: ${{ secrets.DB_PASS }}
  DB_SSL_MODE: ${{ secrets.DB_SSL_MODE }}
  DB_USER: ${{ secrets.DB_USER }}
  UMASK: ${{ secrets.UMASK }}
  DB_TABLE_PREFIX: ${{ secrets.DB_TABLE_PREFIX }}
  DB_TYPE: ${{ secrets.DB_TYPE }}
  DB_HOST: ${{ secrets.DB_HOST }}
  HTTP_PORT: 8080

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: Determine CF API endpoint and app name
      run: |
        # 设置API端点和生成随机字符串
        RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)
        
        case "${{ github.event.inputs.region }}" in
          # 免费区域
          "SG(free)")
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-freesg$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "US(free)")
            echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-freeus$RANDOM_STR" >> $GITHUB_ENV
            ;;
          # SAP 区域
          "SAP-UAE(Dubai)")
            echo "CF_API=https://api.cf.ae01.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=sap-ae$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "SAP-AU(Sydney)")
            echo "CF_API=https://api.cf.ap01.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=sap-ap$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "SAP-US(Sterling)")
            echo "CF_API=https://api.cf.us01.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=sap-us1$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "SAP-US-West(Colorado)")
            echo "CF_API=https://api.cf.us02.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=sap-us2$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "SAP-JP(Tokyo)")
            echo "CF_API=https://api.cf.jp01.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=sap-jp$RANDOM_STR" >> $GITHUB_ENV
            ;;
          # AWS 区域
          "AWS-AU(Sydney)")
            echo "CF_API=https://api.cf.ap10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awsau$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-BR(São Paulo)")
            echo "CF_API=https://api.cf.br10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awsbr$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-KR(Seoul)")
            echo "CF_API=https://api.cf.ap12.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awskr$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-CA(Montreal)")
            echo "CF_API=https://api.cf.ca10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awsca$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-US(VA)")
            echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awsusva$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-US(OR)")
            echo "CF_API=https://api.cf.us11.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awsusor$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-EU(Frankfurt)")
            echo "CF_API=https://api.cf.eu10-005.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awseu$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-JP(Tokyo)")
            echo "CF_API=https://api.cf.jp10.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awsjp$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "AWS-SG(Singapore)")
            echo "CF_API=https://api.cf.ap11.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-awssg$RANDOM_STR" >> $GITHUB_ENV
            ;;
          
          # GCP 区域
          "GCP-AU(Sydney)")
            echo "CF_API=https://api.cf.ap30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpau$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-BR(São Paulo)")
            echo "CF_API=https://api.cf.br30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpbr$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-US(IA)")
            echo "CF_API=https://api.cf.us30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpus$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-EU(Frankfurt)")
            echo "CF_API=https://api.cf.eu30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpeu$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-JP(Osaka)")
            echo "CF_API=https://api.cf.jp30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpjpo$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-JP(Tokyo)")
            echo "CF_API=https://api.cf.jp31.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpjpt$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-IL(Tel Aviv)")
            echo "CF_API=https://api.cf.il30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpil$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-IN(Mumbai)")
            echo "CF_API=https://api.cf.in30.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpin$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "GCP-KSA(Dammam)")
            echo "CF_API=https://api.cf.sa31.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-gcpsa$RANDOM_STR" >> $GITHUB_ENV
            ;;
          
          # Azure 区域
          "Azure-AU(Sydney)")
            echo "CF_API=https://api.cf.ap20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azau$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-BR(São Paulo)")
            echo "CF_API=https://api.cf.br20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azbr$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-CA(Montreal)")
            echo "CF_API=https://api.cf.ca20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azca$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-US(VA)")
            echo "CF_API=https://api.cf.us21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azva$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-US(WA)")
            echo "CF_API=https://api.cf.us20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azwa$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-EU(Netherlands)")
            echo "CF_API=https://api.cf.eu20-001.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azeu$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-JP(Tokyo)")
            echo "CF_API=https://api.cf.jp20.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azjp$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Azure-SG(Singapore)")
            echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-azsg$RANDOM_STR" >> $GITHUB_ENV
            ;;
          
          # SAP Neo 区域
          "Neo-UAE(Dubai)")
            echo "CF_API=https://api.cf.neo-ae1.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-neouae$RANDOM_STR" >> $GITHUB_ENV
            ;;
          "Neo-KSA(Riyadh)")
            echo "CF_API=https://api.cf.neo-sa1.hana.ondemand.com" >> $GITHUB_ENV
            echo "APP_NAME=openlist-neoksa$RANDOM_STR" >> $GITHUB_ENV
            ;;
        esac
        
        # 如果用户提供了应用名称，则使用用户提供的
        if [ -n "${{ github.event.inputs.app_name }}" ]; then
          echo "APP_NAME=${{ github.event.inputs.app_name }}" >> $GITHUB_ENV
        fi
        
        echo "使用API端点: $CF_API"
        echo "应用名称: $APP_NAME"
        echo "部署类型: ${{ env.DOCKER_IMAGE }}"

    - name: Validate required secrets
      run: |
        missing=0
        for name in OPENLIST_ADMIN_PASSWORD DB_PORT DB_NAME DB_PASS DB_SSL_MODE DB_USER UMASK DB_TABLE_PREFIX DB_TYPE DB_HOST; do
          if [ -z "${!name}" ]; then
            echo "::error::Missing required GitHub secret: $name"
            missing=1
          fi
        done
        exit $missing

    - name: Login to Cloud Foundry
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"

        # 获取组织列表
        ORG=$(cf orgs | sed -n '4p')
        echo "Selected org: $ORG"
        echo "ORG=$ORG" >> $GITHUB_ENV

        # 获取空间列表
        SPACE=$(cf spaces | sed -n '4p')
        echo "Selected space: $SPACE"
        echo "SPACE=$SPACE" >> $GITHUB_ENV

        # 使用获取的组织和空间重新登录
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "$ORG" -s "$SPACE"

    - name: Deploy application
      run: |
        if cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m ${{ env.MEMORY }} -k ${{ env.DISK }} --health-check-type port --no-start; then
          echo "Application created, waiting to set environment variables before start"
        else
          cf delete ${{ env.APP_NAME }} -f
          echo "伙计,没资源了,部署失败,请明天早上8:10至9:00再尝试部署,已清理失败部署残留"
          exit 1
        fi
        
    - name: Set environment variables and start app
      run: |
        # OpenList环境变量
        cf set-env ${{ env.APP_NAME }} LANG "${{ secrets.LANG || 'zh_CN.UTF-8' }}"
        cf set-env ${{ env.APP_NAME }} HTTP_PORT "${HTTP_PORT}"
        cf set-env ${{ env.APP_NAME }} DB_PORT "${DB_PORT}"
        cf set-env ${{ env.APP_NAME }} DB_NAME "${DB_NAME}"
        cf set-env ${{ env.APP_NAME }} DB_PASS "${DB_PASS}"
        cf set-env ${{ env.APP_NAME }} DB_SSL_MODE "${DB_SSL_MODE}"
        cf set-env ${{ env.APP_NAME }} DB_USER "${DB_USER}"
        cf set-env ${{ env.APP_NAME }} UMASK "${UMASK}"
        cf set-env ${{ env.APP_NAME }} DB_TABLE_PREFIX "${DB_TABLE_PREFIX}"
        cf set-env ${{ env.APP_NAME }} DB_TYPE "${DB_TYPE}"
        cf set-env ${{ env.APP_NAME }} DB_HOST "${DB_HOST}"
        cf set-env ${{ env.APP_NAME }} OPENLIST_ADMIN_PASSWORD "${OPENLIST_ADMIN_PASSWORD}"
        
        # 可选：从文件读取环境变量(如果存在)
        if [ -f .env ]; then
          while IFS= read -r line; do
            if [[ ! "$line" =~ ^# ]] && [[ -n "$line" ]]; then
              IFS='=' read -r key value <<< "$line"
              cf set-env ${{ env.APP_NAME }} "$key" "$value"
            fi
          done < .env
        fi
        
        if cf start ${{ env.APP_NAME }}; then
          echo "OpenList started"
        else
          echo "OpenList启动失败，查看最近日志:"
          cf logs ${{ env.APP_NAME }} --recent
          exit 1
        fi

    - name: Verify deployment
      run: |
        STATUS=$(cf app ${{ env.APP_NAME }} | grep "requested state:" | awk '{print $3}')
        if [ "$STATUS" = "started" ]; then
          echo "✅ OpenList启动成功"
        else
          echo "❌ 应用启动失败，当前状态: $STATUS"
          echo "查看应用日志:"
          cf logs ${{ env.APP_NAME }} --recent
          exit 1
        fi

    - name: Set OpenList admin password
      run: |
        echo "设置OpenList管理员密码..."
        TASK_NAME="set-openlist-admin-password-${{ github.run_id }}"
        cf run-task ${{ env.APP_NAME }} "sh -lc 'cd /opt/openlist && ./openlist admin set \"\$OPENLIST_ADMIN_PASSWORD\"'" --name "$TASK_NAME"
        
        for i in {1..30}; do
          TASK_STATE=$(cf tasks ${{ env.APP_NAME }} | awk -v task="$TASK_NAME" '$2 == task {print $3; exit}')
          echo "OpenList密码设置任务状态: ${TASK_STATE:-unknown}"
          
          if [ "$TASK_STATE" = "SUCCEEDED" ]; then
            echo "OpenList管理员密码设置成功"
            break
          fi
          
          if [ "$TASK_STATE" = "FAILED" ] || [ "$TASK_STATE" = "CANCELING" ]; then
            echo "OpenList管理员密码设置失败，查看最近日志:"
            cf logs ${{ env.APP_NAME }} --recent
            exit 1
          fi
          
          sleep 5
        done
        
        if [ "$TASK_STATE" != "SUCCEEDED" ]; then
          echo "OpenList管理员密码设置超时，查看任务列表:"
          cf tasks ${{ env.APP_NAME }}
          exit 1
        fi
        
        cf unset-env ${{ env.APP_NAME }} OPENLIST_ADMIN_PASSWORD
        
    - name: 详细部署信息
      run: |
        echo "🚀 部署完成！详细信息如下："
        echo "区域(Region): ${{ github.event.inputs.region }}"
        echo "组织(ORG): ${{ env.ORG }}"
        echo "空间(SPACE): ${{ env.SPACE }}"
        echo "应用名称(App Name): ${{ env.APP_NAME }}"
        echo "OpenList登录账号: admin"
        echo "OpenList登录密码: 使用 GitHub Secret OPENLIST_ADMIN_PASSWORD（日志会自动隐藏）"

        # 获取应用路由
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        if [ -n "$ROUTE" ]; then
          echo "OpenList URL: https://$ROUTE"
        else
          echo "⚠️ 未找到应用路由，请检查部署状态。"
        fi
